services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - COOKIE_SECURE=false
      - SESSION_SECRET=${SESSION_SECRET:-change-me-in-production-min-32-chars!!}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@retiro.local}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
    restart: unless-stopped
